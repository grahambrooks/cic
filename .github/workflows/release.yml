name: release

on:
  push:
    tags:
      # CalVer YYYY.M.D — e.g. 2026.4.25
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN: cic

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Package
        id: pkg
        shell: bash
        env:
          MATRIX_TARGET: ${{ matrix.target }}
          MATRIX_ARCHIVE: ${{ matrix.archive }}
        run: |
          ver="${GITHUB_REF_NAME}"
          stage="cic-${ver}-${MATRIX_TARGET}"
          mkdir -p "dist/${stage}"
          ext=""
          if [[ "${MATRIX_TARGET}" == *windows* ]]; then ext=".exe"; fi
          cp "target/${MATRIX_TARGET}/release/${BIN}${ext}" "dist/${stage}/"
          cp README.md cic.example.toml "dist/${stage}/"
          cd dist
          if [[ "${MATRIX_ARCHIVE}" == "zip" ]]; then
            7z a "${stage}.zip" "${stage}" >/dev/null
            asset="${stage}.zip"
          else
            tar czf "${stage}.tar.gz" "${stage}"
            asset="${stage}.tar.gz"
          fi
          echo "asset=dist/${asset}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cic-${{ matrix.target }}
          path: ${{ steps.pkg.outputs.asset }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute checksums
        id: sha
        shell: bash
        run: |
          cd artifacts
          ls -la
          for f in *; do
            sum=$(sha256sum "$f" | awk '{print $1}')
            echo "$f  $sum"
            stem="${f%.tar.gz}"
            stem="${stem%.zip}"
            target="${stem#cic-${GITHUB_REF_NAME}-}"
            slug=$(printf '%s' "$target" | tr '.-' '__')
            echo "sha_${slug}=${sum}" >> "$GITHUB_OUTPUT"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Regenerate Homebrew formula
        env:
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          SHA_AARCH64_APPLE_DARWIN: ${{ steps.sha.outputs.sha_aarch64_apple_darwin }}
          SHA_X86_64_APPLE_DARWIN: ${{ steps.sha.outputs.sha_x86_64_apple_darwin }}
          SHA_X86_64_UNKNOWN_LINUX_GNU: ${{ steps.sha.outputs.sha_x86_64_unknown_linux_gnu }}
        run: |
          mkdir -p Formula
          cat > Formula/cic.rb <<EOF
          # Auto-generated by .github/workflows/release.yml. Do not edit by hand.
          class Cic < Formula
            desc "Terminal UI for monitoring CI builds across GitHub Actions and Jenkins"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/${REPO}/releases/download/#{version}/cic-#{version}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_AARCH64_APPLE_DARWIN}"
              end
              on_intel do
                url "https://github.com/${REPO}/releases/download/#{version}/cic-#{version}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64_APPLE_DARWIN}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/${REPO}/releases/download/#{version}/cic-#{version}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_X86_64_UNKNOWN_LINUX_GNU}"
              end
            end

            def install
              bin.install "cic"
            end

            test do
              assert_match "Terminal UI", shell_output("#{bin}/cic --help")
            end
          end
          EOF
          cat Formula/cic.rb

      - name: Commit formula update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/cic.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date"
            exit 0
          fi
          git commit -m "Update Homebrew formula for ${GITHUB_REF_NAME}"
          git push origin HEAD:master
